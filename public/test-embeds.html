<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embed Test</title>
<style>
body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
.tabs { display: flex; gap: 10px; padding: 10px; background: #111; }
.tab { padding: 8px 16px; background: #333; border: none; color: #fff; cursor: pointer; border-radius: 4px; }
.tab.active { background: #f59e0b; color: #000; }
iframe { width: 100%; height: calc(100vh - 60px); border: none; }
.info { padding: 10px; background: #111; font-size: 12px; color: #888; }
</style>
</head>
<body>
<div class="info">Testing free streaming embeds for iOS fallback</div>
<div class="tabs">
  <button class="tab active" onclick="load(this, 'vidsrc')">VidSrc (Movie)</button>
  <button class="tab" onclick="load(this, 'vidsrc_tv')">VidSrc (TV)</button>
  <button class="tab" onclick="load(this, '2embed')">2Embed (Movie)</button>
  <button class="tab" onclick="load(this, '2embed_tv')">2Embed (TV)</button>
</div>
<iframe id="player" src="https://vidsrc.to/embed/movie/278" allowfullscreen></iframe>
<script>
const urls = {
  vidsrc: 'https://vidsrc.to/embed/movie/278',
  vidsrc_tv: 'https://vidsrc.to/embed/tv/1396/1/1',
  '2embed': 'https://www.2embed.cc/embed/278',
  '2embed_tv': 'https://www.2embed.cc/embedtv/1396&s=1&e=1',
};
function load(btn, key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('player').src = urls[key];
}
</script>
</body>
</html>
